<!DOCTYPE html>

                        "primary-fixed-dim": "#c8c6c5",

                        "tertiary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#1c1b1b",
                        "on-primary-fixed-variant": "#474646",
                        "on-tertiary-fixed": "#1a1c1c",
                        "outline": "#747878",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-highest": "#e2e2e2",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-container": "#838484",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles to remove default input backgrounds and borders */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #f9f9f9 inset !important;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col font-body-md text-body-md">
<!-- Top Navigation Suppressed due to Linear/Transactional intent (Login page) -->
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-8">
<div class="w-full max-w-sm flex flex-col gap-[48px]">
<!-- Header -->
<div class="text-center">
<h1 class="font-h1 text-h1 text-on-surface">Welcome back</h1>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-8">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-2 text-on-surface focus:ring-0 focus:border-primary transition-colors duration-300 placeholder:text-outline" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-2 text-on-surface focus:ring-0 focus:border-primary transition-colors duration-300 placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-4">
<button class="w-full bg-primary text-on-primary py-4 rounded font-label-sm text-label-sm uppercase tracking-wider transition-opacity hover:opacity-80" type="button">
                        Sign In
                    </button>
<div class="text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors duration-300 border-b border-transparent hover:border-primary pb-0.5" href="#">
                            Don't have an account? Register
                        </a>
</div>
</div>
</form>
</div>
</main>
<!-- Shared Component: Footer -->
<footer class="bg-transparent text-[11px] font-inter tracking-wider uppercase fixed bottom-0 w-full border-none flex justify-center items-center gap-8 pb-12 w-full text-neutral-400 dark:text-neutral-600">
<span>© 2024 ESSENTIALISM</span>
<a class="text-neutral-400 dark:text-neutral-600 hover:text-neutral-900 dark:hover:text-neutral-200 transition-colors duration-300 cursor-pointer" href="#">Terms</a>
<a class="text-neutral-400 dark:text-neutral-600 hover:text-neutral-900 dark:hover:text-neutral-200 transition-colors duration-300 cursor-pointer" href="#">Privacy</a>
<a class="text-neutral-400 dark:text-neutral-600 hover:text-neutral-900 dark:hover:text-neutral-200 transition-colors duration-300 cursor-pointer" href="#">Help</a>
</footer>
